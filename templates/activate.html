<!DOCTYPE html>
<html>
<head>
    <title>TravelMate - Activate Account</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0078d4;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #005ea6;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .info-box {
            background-color: #eef6ff;
            padding: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #0078d4;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>TravelMate</h2>

    <div class="info-box">
        First-time employees can activate their account using their Employee ID.
    </div>

    <form method="POST">

        <label>Employee ID</label>
        <input type="text" name="employee_id" required>

        <label>Create Password</label>
        <input type="password" name="password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>

        <button type="submit">
            Activate Account
        </button>

    </form>

    <div class="login-link">
        <a href="/login">Back to Login</a>
    </div>

</div>

</body>
</html>
