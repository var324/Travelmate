<!DOCTYPE html>
<html>
<head>
    <title>Create Trip</title>
</head>
<body>

<h2>✈️ Create Trip Request</h2>

<form method="POST">

    <input name="origin" placeholder="Origin (e.g. MCI)" required>
    <br><br>

    <input name="destination" placeholder="Destination (e.g. London)" required>
    <br><br>

    <input type="date" name="start_date" required>
    <br><br>

    <input type="date" name="end_date" required>
    <br><br>

    <input name="purpose" placeholder="Purpose of travel" required>
    <br><br>

    <button type="submit">Submit Trip</button>

</form>

<br>
<a href="/dashboard">← Back to Dashboard</a>

</body>
</html>
